<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravity Editor</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #222; font-family: sans-serif;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        /* Mobile Screen Emulator */
        #device {
            width: 320px; height: 480px; background: #fff; position: relative;
            border: 2px solid #555; outline: 10px solid #111; border-radius: 4px;
            display: flex; flex-direction: column; overflow: hidden;
        }
        /* J2ME Displayable */
        #lcdui { display: none; flex-direction: column; height: 100%; background: #eee; }
        #lcdui-title { background: #d2d2ff; color: #000037; padding: 4px 6px; font-weight: bold; border-bottom: 1px solid #000037; font-size: 14px; }
        #lcdui-content { flex: 1; overflow-y: auto; padding: 4px; font-size: 14px; }
        
        /* J2ME Controls styles */
        .list-item { padding: 6px; cursor: pointer; border-bottom: 1px solid #ccc; }
        .list-item.selected { background: #000080; color: #fff; }
        .form-label { font-size: 12px; color: #333; margin-top: 6px; display: block; }
        input[type="text"] { width: 90%; padding: 4px; font-size: 14px; border: 1px solid #888; margin-bottom: 6px; }
        .choice-group { margin-bottom: 10px; }
        .choice-item { display: flex; align-items: center; padding: 4px 0; }
        .choice-item input { margin-right: 8px; }

        /* J2ME Command Menu Overlay */
        #cmd-menu {
            display: none; position: absolute; bottom: 30px; left: 5px; width: 150px;
            background: #fff; border: 1px solid #000; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); z-index: 100;
        }
        .cmd-item { padding: 6px 10px; font-size: 14px; cursor: pointer; color: #000; }
        .cmd-item.selected { background: #000080; color: #fff; }

        /* Softkeys */
        #softkeys, #canvas-softkeys {
            display: flex; justify-content: space-between; align-items: center;
            background: #ccc; border-top: 1px solid #999; height: 30px; padding: 0 10px;
            font-size: 12px; font-weight: bold; color: #000;
        }
        #canvas-softkeys { position: absolute; bottom: 0; width: 100%; box-sizing: border-box; background: transparent; border: none; }
        .softkey { cursor: pointer; text-shadow: 1px 1px 0px #fff; pointer-events: auto; }
        
        /* Game Canvas */
        #game { display: block; width: 100%; height: calc(100% - 30px); }
        
        /* File Input (Hidden) */
        #fileLoad { display: none; }
        
        /* Helper hints for PC users */
        #hints { position: absolute; left: calc(50% + 180px); color: #fff; max-width: 300px; font-size: 14px; line-height: 1.5; }
        kbd { background: #444; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="device">
        <!-- Canvas View -->
        <canvas id="game"></canvas>
        <div id="canvas-softkeys">
            <div id="c-sk-left" class="softkey">Menu</div>
            <div id="c-sk-right" class="softkey"></div>
        </div>

        <!-- UI View (Forms/Lists) -->
        <div id="lcdui">
            <div id="lcdui-title">Title</div>
            <div id="lcdui-content"></div>
            <div id="softkeys">
                <div id="sk-left" class="softkey"></div>
                <div id="sk-right" class="softkey"></div>
            </div>
        </div>

        <!-- Command Menu View -->
        <div id="cmd-menu">
            <div id="cmd-list"></div>
        </div>
    </div>

    <input type="file" id="fileLoad" accept=".mrg">

    <div id="hints">
        <h3>Controls (Exactly like J2ME)</h3>
        <p><kbd>Arrows</kbd> = Move Camera</p>
        <p><kbd>7</kbd> (Hold) + Arrows = Move Point / Bounds</p>
        <p><kbd>#</kbd> (Shift+3) = Add Point</p>
        <p><kbd>*</kbd> (Shift+8) = Remove Point</p>
        <p><kbd>Enter</kbd> = Select / Left Softkey</p>
        <p><kbd>Esc</kbd> = Back / Right Softkey</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
